<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite Especial | Juliane Alves Clinic & Dimarri Esmalteria</title>
    <!-- Fontes elegantes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #f7f5f0;
            --envelope-inner: #d8cebe;
            --envelope-back: #c8bcab;
            --envelope-front: #ece6de;
            --flap-color: #e2d8cb;
            --gold: #b8986a;
            --gold-hover: #a18256;
            --text-dark: #3a3532;
            --text-muted: #8c8275;
            --shadow: rgba(60, 50, 40, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Montserrat', sans-serif;
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 40px 15px;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 30%, #ffffff 0%, var(--bg-color) 70%);
        }

        /* Container Principal */
        .main-container {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* Cabeçalho */
        .header-title {
            text-align: center;
            transition: opacity 0.5s ease;
        }

        .header-title h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 6px;
        }

        .instruction {
            font-size: 0.82rem;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: var(--text-muted);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* --- PALCO / ÁREA DO ENVELOPE --- */
        .stage {
            width: 100%;
            display: flex;
            justify-content: center;
            position: relative;
            margin-top: 140px;
        }

        .envelope-wrapper {
            position: relative;
            width: 320px;
            height: 200px;
            background-color: var(--envelope-inner);
            border-radius: 6px;
            box-shadow: 0 15px 35px var(--shadow);
            cursor: pointer;
        }

        /* Fundo do envelope */
        .envelope-back {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--envelope-back);
            border-radius: 6px;
            z-index: 1;
        }

        /* O Convite */
        .letter {
            position: absolute;
            top: 10px;
            left: 5%;
            width: 90%;
            height: 180px;
            background-color: #ffffff;
            border-radius: 6px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            
            z-index: 2;
            overflow: hidden;
            border: 1px solid #eae3db;
            opacity: 0;
            
            transition: transform 2.2s cubic-bezier(0.2, 1, 0.3, 1), 
                        height 2.2s cubic-bezier(0.2, 1, 0.3, 1), 
                        opacity 0.4s ease;
            transform: translateY(0);
        }

        .letter img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            pointer-events: none;
        }

        /* Bolso Frontal do Envelope */
        .pocket {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 160px solid var(--envelope-front);
            border-right: 160px solid var(--envelope-front);
            border-bottom: 110px solid var(--envelope-front);
            border-top: 90px solid transparent;
            border-radius: 0 0 6px 6px;
            z-index: 3;
            filter: drop-shadow(0 -1px 3px rgba(0,0,0,0.04));
        }

        /* Aba Superior do Envelope (Flap) */
        .flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 160px solid transparent;
            border-right: 160px solid transparent;
            border-top: 110px solid var(--flap-color);
            transform-origin: top center;
            transition: transform 0.8s ease-in-out, z-index 0.8s ease-in-out;
            z-index: 4;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.08));
        }

        /* Selo Dourado */
        .wax-seal {
            position: absolute;
            top: 88px;
            left: 50%;
            transform: translateX(-50%);
            width: 42px;
            height: 42px;
            background: radial-gradient(circle, #dfc085 0%, #a88548 100%);
            border-radius: 50%;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            color: #fff;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            transition: opacity 0.5s ease, transform 0.5s ease;
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* --- ANIMAÇÃO AO CLICAR (.open) --- */

        .envelope-wrapper.open .flap {
            transform: rotateX(180deg);
            z-index: 1;
        }

        .envelope-wrapper.open .wax-seal {
            opacity: 0;
            transform: translateX(-50%) scale(0.3);
            pointer-events: none;
        }

        .envelope-wrapper.open .letter {
            opacity: 1;
            height: 400px;
            transform: translateY(-210px);
            z-index: 4;
            transition: opacity 0.3s ease 0.3s, 
                        height 2.2s cubic-bezier(0.2, 1, 0.3, 1) 0.5s, 
                        transform 2.2s cubic-bezier(0.2, 1, 0.3, 1) 0.5s, 
                        z-index 0s 1.2s;
        }

        /* --- BOTÃO DE CONFIRMAÇÃO DE PRESENÇA --- */
        .actions-area {
            margin-top: 35px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: opacity 0.8s ease, transform 0.8s ease, visibility 0.8s ease;
            transform: translateY(15px);
        }

        /* Classe ativada via JS */
        .actions-area.visible {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
            transform: translateY(0);
        }

        .btn-rsvp {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 16px 36px;
            background: linear-gradient(135deg, #c8aa7a 0%, #a68453 100%);
            color: #ffffff;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            border-radius: 50px;
            box-shadow: 0 8px 25px rgba(184, 152, 106, 0.35);
            transition: all 0.3s ease;
            width: 100%;
            max-width: 320px;
            border: none;
            cursor: pointer;
            text-align: center;
        }

        .btn-rsvp:hover, .btn-rsvp:active {
            background: linear-gradient(135deg, #b8986a 0%, #957343 100%);
            box-shadow: 0 10px 28px rgba(184, 152, 106, 0.5);
            transform: translateY(-2px);
        }

        .event-info-footer {
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-align: center;
        }

        /* --- RESPONSIVIDADE PARA SMARTPHONES --- */
        @media (max-width: 480px) {
            body {
                padding: 25px 10px;
            }

            .stage {
                margin-top: 130px;
            }

            .envelope-wrapper {
                width: 290px;
                height: 185px;
            }

            .pocket {
                border-left-width: 145px;
                border-right-width: 145px;
                border-bottom-width: 100px;
                border-top-width: 85px;
            }

            .flap {
                border-left-width: 145px;
                border-right-width: 145px;
                border-top-width: 100px;
            }

            .wax-seal {
                top: 78px;
                width: 38px;
                height: 38px;
            }

            .letter {
                height: 160px;
            }

            .envelope-wrapper.open .letter {
                height: 360px;
                transform: translateY(-190px);
            }

            .btn-rsvp {
                padding: 14px 28px;
                font-size: 0.8rem;
                max-width: 280px;
            }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- Título Superior -->
        <div class="header-title">
            <h1>Você é nosso convidado</h1>
            <p class="instruction" id="instruction">Toque no envelope para abrir</p>
        </div>

        <!-- Envelope e Animação -->
        <div class="stage">
            <div class="envelope-wrapper" id="envelope" role="button" aria-label="Abrir convite">
                <div class="envelope-back"></div>
                
                <!-- A carta -->
                <div class="letter" id="letterCard">
                    <!-- Substitua 'convite.png' pela sua imagem exportada do Canva -->
                    <img src="convite.png" alt="Convite Juliane Alves Clinic & Dimarri Esmalteria">
                </div>

                <!-- O bolso frontal do envelope -->
                <div class="pocket"></div>
                
                <!-- A aba superior do envelope -->
                <div class="flap"></div>
                
                <!-- O selo de cera -->
                <div class="wax-seal">✦</div>
            </div>
        </div>

        <!-- Botão de Confirmação de Presença -->
        <div class="actions-area" id="actionsArea">
            <!-- INSIRA O LINK DO SEU GOOGLE FORMS NO 'href' ABAIXO -->
            <a href="https://forms.google.com/SEU_LINK_AQUI" target="_blank" rel="noopener noreferrer" class="btn-rsvp">
                Confirmar Presença
            </a>
            <p class="event-info-footer">Juliane Alves Clinic & Dimarri Esmalteria</p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const envelope = document.getElementById('envelope');
            const instruction = document.getElementById('instruction');
            const actionsArea = document.getElementById('actionsArea');

            envelope.addEventListener('click', () => {
                const isOpen = envelope.classList.toggle('open');
                
                if (isOpen) {
                    instruction.style.opacity = '0';
                    
                    // Exibe o botão suavemente após o clique
                    setTimeout(() => {
                        actionsArea.classList.add('visible');
                    }, 800);

                    setTimeout(() => {
                        instruction.textContent = 'Toque no envelope para fechar';
                        instruction.style.opacity = '0.5';
                    }, 1500);
                } else {
                    instruction.style.opacity = '0';
                    actionsArea.classList.remove('visible');

                    setTimeout(() => {
                        instruction.textContent = 'Toque no envelope para abrir';
                        instruction.style.opacity = '1';
                    }, 500);
                }
            });
        });
    </script>

</body>
</html>
